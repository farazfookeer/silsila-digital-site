<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background, transparent for adaptable use -->
  <rect width="64" height="64" rx="8" fill="#F7F4EE"/>

  <!-- Two interlocking chain links representing 'silsila' (chain) -->
  <!-- Left link -->
  <rect x="10" y="20" width="28" height="24" rx="12" ry="12"
        fill="none" stroke="#C24A1E" stroke-width="5"/>

  <!-- Right link (interlocked) -->
  <rect x="26" y="20" width="28" height="24" rx="12" ry="12"
        fill="none" stroke="#1A1A1A" stroke-width="5"/>

  <!-- Cover the crossing point to suggest 'over/under' weave -->
  <!-- Left link passes over right link on the top -->
  <path d="M 26 20 A 12 12 0 0 1 38 20"
        fill="none" stroke="#C24A1E" stroke-width="5" stroke-linecap="round"/>
</svg>
